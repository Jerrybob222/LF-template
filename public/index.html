		<div style="text-align: center; " class="flex-center desc left-margin">
			<p style="color: grey;">
		 Search using the search bar below
			</p>

<!-- The value (default to brave) is the default search engine for the browser-->
<!-- Make sure to have " ?q=%s " when changing default engine-->

		<form id="sj-form" class="flex-center">
			<input
				id="sj-search-engine"
				value="https://search.brave.com/search?q=%s"
				type="hidden"
			/>
			<input id="sj-address" type="text" placeholder="Find a lesson" />
		</form>




<hr style="width: 10%; margin-top: 25px;">

<h3 style="color: rgb(218, 217, 224); text-align: center; ;"> Applications </h3>


		<style>
			.lesson-link {
				border: none;
				background: none;
				padding: 0;
			}
			.lesson-link img {
				transition: transform 0.2s ease;
			}
			.lesson-link img:hover {
				transform: scale(1.2);
			}
		</style>

		<div class="flex-center">




<!-- change the .value="" for site. src is for image-->
<!-- app -->

			<button onclick="document.getElementById('sj-address').value='https://play.geforcenow.com/mall/'; document.getElementById('sj-form').dispatchEvent(new Event('submit')); return false;" class="lesson-link">
				<img src="gfn.png" title="GFN" alt="Click to visit website" style="cursor: pointer; max-width: 80px; margin: 15px;" />
			</button>

<!-- end of app -->




<!-- app -->

<!-- end of app -->
